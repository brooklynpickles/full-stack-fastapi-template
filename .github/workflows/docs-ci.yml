name: Docs CI

# This repo has no static OpenAPI file to diff: the spec is generated at
# runtime by FastAPI from the Pydantic/SQLModel models. So instead of
# git-diffing a checked-in YAML like the other three repos in this
# pipeline, this workflow starts the backend, fetches the live spec from
# http://localhost:8000/api/v1/openapi.json, and diffs that fetch against
# a JSON snapshot checked into docs/openapi-snapshot.json. After drafting,
# it updates the snapshot so the next run diffs against this one.

on:
  pull_request:
    paths:
      - "backend/app/models.py"
      - "backend/app/api/**"
      - "docs/**"
  push:
    branches: [master]
    paths:
      - "backend/app/models.py"
      - "backend/app/api/**"
      - "docs/**"

jobs:
  # One job for both linters: each extra job pays its own runner spin-up and
  # checkout, and these finish in seconds once the backend is up.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose up -d db backend
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/openapi.json -o /tmp/live-spec.json && break
            sleep 2
          done
      - run: npx --yes @stoplight/spectral-cli@6.16.1 lint /tmp/live-spec.json --ruleset tooling/.spectral.yaml
      # Run Vale directly (pinned) instead of the reviewdog-based action: it
      # avoids the action's PR-only reporter and resolves StylesPath relative to
      # the ruleset. StylesPath in tooling/.vale.ini points at tooling/styles.
      - name: Vale prose lint
        run: |
          curl -sSfL https://github.com/errata-ai/vale/releases/download/v3.15.1/vale_3.15.1_Linux_64-bit.tar.gz \
            | tar -xz vale
          ./vale --config=tooling/.vale.ini docs

  draft-docs-from-spec-change:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # create-pull-request needs write to push the draft branch and open the PR;
    # the default GITHUB_TOKEN is read-only.
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose up -d db backend
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/openapi.json -o /dev/null && break
            sleep 2
          done
      - name: Fetch current spec (pretty-printed for a meaningful line diff)
        run: curl -s http://localhost:8000/api/v1/openapi.json | python3 -m json.tool > /tmp/new-spec.json
      - name: Draft docs update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic  # optional for the script; gives SDK retries/timeouts in CI
          python3 tooling/scripts/draft_docs_from_diff.py \
            --old-spec docs/openapi-snapshot.json \
            --new-spec /tmp/new-spec.json \
            --doc docs/items.md \
            --out docs/items.md \
            --product-name "Full Stack FastAPI Template"
      - name: Update the baseline snapshot for next time
        run: cp /tmp/new-spec.json docs/openapi-snapshot.json
      - uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: draft update from spec change"
          title: "[auto-draft] Update docs for spec change"
          body: "Opened automatically from a live spec diff (fetched from the running backend, not a git diff of a spec file). Needs human review before merge."
          branch: auto/docs-draft
          add-paths: |
            docs/items.md
            docs/openapi-snapshot.json

  sync-to-docs-site:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch docs-sync to the aggregator site
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.DOCS_SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/brooklynpickles/docs-pipeline-site/dispatches \
            -d '{"event_type":"docs-sync","client_payload":{"repo":"full-stack-fastapi-template","ref":"master","product_dir":"fastapi-template","label":"Full Stack FastAPI Template","position":4}}'
